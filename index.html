<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Treino Monstro</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

  <!-- HOME -->
  <div id="home">
    <h1>🔥 Treino Monstro</h1>
    
    <div class="card">
      <p>Streak: <span id="streak">0</span> dias</p>
      <p>Nível: <span id="level">1</span></p>
      <div class="progress-bar">
        <div id="xpBar"></div>
      </div>
    </div>

    <button onclick="abrirConfig()">Começar Treino</button>
  </div>

  <!-- CONFIG -->
  <div id="config" class="hidden">
    <h2>Personalizar Treino</h2>

    <select id="objetivo">
      <option value="forca">Força</option>
      <option value="emagrecer">Emagrecer</option>
    </select>

    <select id="nivel">
      <option value="iniciante">Iniciante</option>
      <option value="intermediario">Intermediário</option>
      <option value="avancado">Avançado</option>
    </select>

    <select id="equipamento">
      <option value="nenhum">Sem equipamento</option>
      <option value="halter">Halter</option>
    </select>

    <button onclick="gerarTreino()">Gerar Treino</button>
  </div>

  <!-- TREINO -->
  <div id="treino" class="hidden">
    <h2>Seu Treino</h2>
    <ul id="listaTreino"></ul>
    <button onclick="finalizarTreino()">Finalizar</button>
  </div>

</div>

<script src="script.js"></script>
</body>
</html>
