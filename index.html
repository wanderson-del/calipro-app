<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#22c55e">
  <title>Cali PRO+ Supremo</title>
  <style>
    :root { --bg: #0b1220; --card: #161f35; --accent: #22c55e; --text: #fff; --muted: #94a3b8; }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body { margin: 0; background: var(--bg); color: var(--text); font-family: sans-serif; display: flex; flex-direction: column; min-height: 100vh; }
    header { padding: 15px; background: #0f172a; border-bottom: 1px solid #1e293b; text-align: center; }
    .container { flex: 1; padding: 20px 15px 100px; }
    .page { display: none; }
    .page.active { display: block; }
    .card { background: #161f35; padding: 20px; border-radius: 15px; margin-bottom: 15px; border: 1px solid #1e293b; }
    .btn { border: none; border-radius: 10px; padding: 15px; width: 100%; font-weight: bold; font-size: 16px; cursor: pointer; margin-top: 10px; }
    .btn-primary { background: var(--accent); color: #064e3b; }
    nav { position: fixed; bottom: 0; width: 100%; background: #0f172a; display: flex; height: 70px; border-top: 1px solid #1e293b; }
    nav button { flex: 1; background: none; border: none; color: var(--muted); display: flex; flex-direction: column; align-items: center; justify-content: center; }
    nav button.active { color: var(--accent); }
    input { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #334155; background: #0b1220; color: #fff; margin-bottom: 10px; }
  </style>
</head>
<body>

<header><h1 style="margin:0; font-size:18px; color:var(--accent);">CALI PRO+</h1></header>

<div class="container">
  <div id="p-treino" class="page active">
    <div class="card" id="setup">
      <h3>Qual o treino de hoje?</h3>
      <select id="treino-select" style="width:100%; padding:10px; border-radius:8px; background:#0b1220; color:white;">
        <option value="A">Treino A (Empurrar/Perna)</option>
        <option value="B">Treino B (Puxar/Core)</option>
      </select>
      <button class="btn btn-primary" onclick="startW()">COMEÇAR</button>
    </div>
    <div class="card" id="workout" style="display:none;">
      <h2 id="ex-nome">---</h2>
      <p id="ex-reps" style="font-size:24px; color:var(--accent);">---</p>
      <button class="btn btn-primary" onclick="nextW()">CONCLUÍDO</button>
    </div>
  </div>

  <div id="p-perfil" class="page">
    <div class="card">
      <h3>Meu Perfil</h3>
      <label>Nome:</label>
      <input type="text" id="u-name">
      <label>Peso (kg):</label>
      <input type="number" id="u-weight">
      <label>Altura (cm):</label>
      <input type="number" id="u-height">
      <button class="btn btn-primary" onclick="saveP()">SALVAR PERFIL</button>
    </div>
  </div>
</div>

<nav>
  <button onclick="tab('treino')" id="t-treino" class="active"><span>💪</span>Treino</button>
  <button onclick="tab('perfil')" id="t-perfil"><span>👤</span>Perfil</button>
</nav>

<script>
  // SEUS TREINOS A E B ORGANIZADOS
  const TREINOS = {
    'A': [
      {n: 'Flexão de Braço', r: '3x12'},
      {n: 'Agachamento', r: '3x15'},
      {n: 'Mergulho no Banco', r: '3x10'}
    ],
    'B': [
      {n: 'Barra Fixa (ou Australiana)', r: '3x8'},
      {n: 'Prancha Abdominal', r: '3x45s'},
      {n: 'Elevação de Pernas', r: '3x12'}
    ]
  };

  let atual = [], idx = 0;

  function tab(p) {
    document.querySelectorAll('.page').forEach(pg => pg.classList.remove('active'));
    document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
    document.getElementById('p-'+p).classList.add('active');
    document.getElementById('t-'+p).classList.add('active');
  }

  function startW() {
    atual = TREINOS[document.getElementById('treino-select').value];
    idx = 0;
    document.getElementById('setup').style.display = 'none';
    document.getElementById('workout').style.display = 'block';
    showEx();
  }

  function showEx() {
    document.getElementById('ex-nome').innerText = atual[idx].n;
    document.getElementById('ex-reps').innerText = atual[idx].r;
  }

  function nextW() {
    if(idx < atual.length - 1) { idx++; showEx(); }
    else { alert("Treino Finalizado!"); resetW(); }
  }

  function resetW() {
    document.getElementById('setup').style.display = 'block';
    document.getElementById('workout').style.display = 'none';
  }

  function saveP() {
    localStorage.setItem('cali_nome', document.getElementById('u-name').value);
    localStorage.setItem('cali_peso', document.getElementById('u-weight').value);
    localStorage.setItem('cali_alt', document.getElementById('u-height').value);
    alert("Perfil atualizado!");
  }

  window.onload = () => {
    document.getElementById('u-name').value = localStorage.getItem('cali_nome') || "";
    document.getElementById('u-weight').value = localStorage.getItem('cali_peso') || "";
    document.getElementById('u-height').value = localStorage.getItem('cali_alt') || "";
  };
</script>
</body>
        </html>
