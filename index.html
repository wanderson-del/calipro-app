<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#22c55e">
  <title>Cali PRO+ Supremo</title>
  <style>
    :root { --bg: #0b1220; --card: #161f35; --accent: #22c55e; --text: #fff; --muted: #94a3b8; }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body { margin: 0; background: var(--bg); color: var(--text); font-family: sans-serif; min-height: 100vh; display: flex; flex-direction: column; }
    header { padding: 15px; background: #0f172a; border-bottom: 1px solid #1e293b; text-align: center; position: sticky; top: 0; z-index: 100; }
    .container { flex: 1; padding: 20px 15px 100px; }
    .page { display: none; }
    .page.active { display: block; animation: fadeIn 0.3s ease; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    .card { background: #161f35; padding: 20px; border-radius: 15px; margin-bottom: 15px; border: 1px solid rgba(34, 197, 94, 0.2); }
    .btn { border: none; border-radius: 10px; padding: 15px; width: 100%; font-weight: bold; font-size: 16px; cursor: pointer; margin-top: 10px; }
    .btn-primary { background: var(--accent); color: #064e3b; }
    .btn-secondary { background: #1e293b; color: #fff; }
    nav { position: fixed; bottom: 0; width: 100%; background: #0f172a; display: flex; height: 75px; border-top: 1px solid #1e293b; z-index: 1000; }
    nav button { flex: 1; background: none; border: none; color: var(--muted); display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 12px; }
    nav button span { font-size: 20px; margin-bottom: 4px; }
    nav button.active { color: var(--accent); font-weight: bold; }
    input, select { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #334155; background: #0b1220; color: #fff; margin-bottom: 15px; font-size: 16px; }
    label { font-size: 12px; color: var(--muted); display: block; margin-bottom: 5px; }
  </style>
</head>
<body>

<header><h1 style="margin:0; font-size:18px; color:var(--accent);">CALI PRO+</h1></header>

<div class="container">
  <div id="p-treino" class="page active">
    <div class="card" id="setup">
      <h3>Bora para o Treino?</h3>
      <label>Selecione o treino do dia:</label>
      <select id="treino-tipo">
        <option value="A">Treino A (Empurrar / Perna)</option>
        <option value="B">Treino B (Puxar / Core)</option>
      </select>
      <button class="btn btn-primary" onclick="iniciarTreino()">INICIAR AGORA</button>
    </div>

    <div class="card" id="workout" style="display:none;">
      <h2 id="ex-nome" style="margin-top:0;">---</h2>
      <div id="ex-reps" style="font-size:32px; color:var(--accent); font-weight:900; margin: 20px 0;">---</div>
      <button class="btn btn-primary" onclick="proximoEx()">CONCLUÍDO</button>
      <button class="btn btn-secondary" onclick="pararTreino()">PARAR</button>
    </div>
  </div>

  <div id="p-perfil" class="page">
    <div class="card">
      <h3>Meu Perfil</h3>
      <label>Nome:</label>
      <input type="text" id="u-nome" placeholder="Seu nome">
      <label>Peso Atual (kg):</label>
      <input type="number" step="0.1" id="u-peso" placeholder="Ex: 61.8">
      <label>Altura (cm):</label>
      <input type="number" id="u-altura" placeholder="Ex: 175">
      <button class="btn btn-primary" onclick="salvarPerfil()">SALVAR DADOS</button>
    </div>
    <div class="card" id="status-card" style="display:none; text-align:center;">
      <p id="info-resumo"></p>
    </div>
  </div>
</div>

<nav>
  <button onclick="tab('treino')" id="tab-treino" class="active"><span>💪</span>Treino</button>
  <button onclick="tab('perfil')" id="tab-perfil"><span>👤</span>Perfil</button>
</nav>

<script>
  const TREINOS = {
    'A': [
      {n: 'Flexão de Braço', r: '3x12'},
      {n: 'Agachamento', r: '3x15'},
      {n: 'Mergulho (Dips)', r: '3x10'},
      {n: 'Panturrilha', r: '3x20'}
    ],
    'B': [
      {n: 'Barra Fixa (ou Australiana)', r: '3x8'},
      {n: 'Prancha', r: '3x45s'},
      {n: 'Elevação de Pernas', r: '3x12'},
      {n: 'Remada Curvada (se tiver carga)', r: '3x12'}
    ]
  };

  let exerciciosAtuais = [], indiceAtivo = 0;

  function tab(p) {
    document.querySelectorAll('.page').forEach(pg => pg.classList.remove('active'));
    document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
    document.getElementById('p-' + p).classList.add('active');
    document.getElementById('tab-' + p).classList.add('active');
  }

  function iniciarTreino() {
    const tipo = document.getElementById('treino-tipo').value;
    exerciciosAtuais = TREINOS[tipo];
    indiceAtivo = 0;
    document.getElementById('setup').style.display = 'none';
    document.getElementById('workout').style.display = 'block';
    mostrarExercicio();
  }

  function mostrarExercicio() {
    document.getElementById('ex-nome').innerText = exerciciosAtuais[indiceAtivo].n;
    document.getElementById('ex-reps').innerText = exerciciosAtuais[indiceAtivo].r;
  }

  function proximoEx() {
    if (indiceAtivo < exerciciosAtuais.length - 1) {
      indiceAtivo++;
      mostrarExercicio();
    } else {
      alert("🏆 Treino Finalizado com sucesso!");
      pararTreino();
    }
  }

  function pararTreino() {
    document.getElementById('setup').style.display = 'block';
    document.getElementById('workout').style.display = 'none';
  }

  function salvarPerfil() {
    const n = document.getElementById('u-nome').value;
    const p = document.getElementById('u-peso').value;
    const a = document.getElementById('u-altura').value;
    
    localStorage.setItem('cali_nome', n);
    localStorage.setItem('cali_peso', p);
    localStorage.setItem('cali_alt', a);
    
    alert("Perfil Salvo!");
    carregarPerfil();
  }

  function carregarPerfil() {
    const nome = localStorage.getItem('cali_nome') || "";
    const peso = localStorage.getItem('cali_peso') || "";
    const alt = localStorage.getItem('cali_alt') || "";

    document.getElementById('u-nome').value = nome;
    document.getElementById('u-peso').value = peso;
    document.getElementById('u-altura').value = alt;

    if(nome && peso) {
      document.getElementById('status-card').style.display = 'block';
      document.getElementById('info-resumo').innerHTML = `<b>${nome}</b>, foco total nos <b>${peso}kg</b>! 💪`;
    }
  }

  window.onload = carregarPerfil;
</script>

</body>
        </html>
