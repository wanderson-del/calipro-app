<!-- ===================== CALIPRO VICIANTE FINAL ===================== --><!DOCTYPE html><html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CaliPRO</title>
<link rel="stylesheet" href="style.css">
</head>
<body><div class="container" id="app"></div><div class="nav">
  <button onclick="nav('home')">Início</button>
  <button onclick="nav('treino')">Treino</button>
  <button onclick="nav('progresso')">Progresso</button>
</div><script>
let tela = 'home';

function nav(t){ tela = t; render(); }

function render(){
  const app = document.getElementById('app');

  let xp = parseInt(localStorage.getItem("xp") || 0);
  let nivel = Math.floor(xp / 50);
  let streak = localStorage.getItem("streak") || 0;

  if(tela === 'home'){
    app.innerHTML = `
      <div class='card fade-in'>
        <h2>🔥 Streak: ${streak} dias</h2>
        <p>Nível ${nivel}</p>
        <div class="progress-bar">
          <div class="progress-fill" style="width:${xp % 50 * 2}%"></div>
        </div>
        <button class="primary" onclick="nav('treino')">Treinar agora</button>
      </div>
    `;
  }

  if(tela === 'treino'){
    let treino = ["Flexão 3x10","Agachamento 3x12","Prancha 30s x3"];

    let html = `<div class='card'><h2>Treino</h2>`;

    treino.forEach(e => {
      html += `<div class='exercicio'>${e}</div>`;
    });

    html += `<button onclick="finalizarTreino()">Finalizar Treino</button></div>`;

    app.innerHTML = html;
  }

  if(tela === 'progresso'){
    app.innerHTML = `
      <div class='card'>
        <h2>Progresso</h2>
        <p>XP: ${xp}</p>
        <p>Nível: ${nivel}</p>
        <p>Streak: ${streak}</p>
      </div>
    `;
  }
}

function atualizarStreak(){
  let hoje = new Date().toDateString();
  let ultimo = localStorage.getItem("ultimoTreino");
  let streak = parseInt(localStorage.getItem("streak") || 0);

  if(ultimo !== hoje){
    streak++;
    localStorage.setItem("streak", streak);
    localStorage.setItem("ultimoTreino", hoje);
  }
}

function ganharXP(){
  let xp = parseInt(localStorage.getItem("xp") || 0);
  xp += 10;
  localStorage.setItem("xp", xp);
}

function checarConquistas(){
  let streak = parseInt(localStorage.getItem("streak") || 0);

  if(streak === 3) alert("🏆 3 dias seguidos!");
  if(streak === 7) alert("🔥 7 dias! MONSTRO!");
}

function finalizarTreino(){
  atualizarStreak();
  ganharXP();
  checarConquistas();
  alert("Treino concluído +10XP");
  render();
}

render();
</script></body>
</html>
