<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#22c55e">
  <title>Cali PRO+ Supremo</title>
  <style>
    :root { 
      --bg: #0b1220; --card: #161f35; --accent: #22c55e; 
      --muted: #94a3b8; --text: #fff; --gold: #f59e0b;
    }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body { 
      margin: 0; background: var(--bg); color: var(--text);
      font-family: system-ui, sans-serif; min-height: 100vh;
      display: flex; flex-direction: column;
    }
    header { 
      padding: 15px 20px; background: #0f172a; border-bottom: 1px solid #1e293b;
      display: flex; justify-content: space-between; align-items: center;
      position: sticky; top: 0; z-index: 100;
    }
    .container { flex: 1; padding: 20px 15px 110px; }
    .page { display: none; }
    .page.active { display: block; animation: fadeIn 0.3s ease; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    .card { 
      background: linear-gradient(145deg, #161f35, #121a2b);
      padding: 20px; border-radius: 20px; margin-bottom: 15px;
      border: 1px solid rgba(34, 197, 94, 0.15);
    }
    .btn { 
      border: none; border-radius: 12px; padding: 15px; width: 100%; 
      font-weight: 700; font-size: 16px; cursor: pointer;
    }
    .btn-primary { background: var(--accent); color: #064e3b; }
    .btn-secondary { background: #1e293b; color: var(--text); margin-top: 10px; }
    
    nav { 
      position: fixed; bottom: 0; left: 0; width: 100%; 
      background: #0f172a; display: flex; height: 80px; 
      border-top: 1px solid #1e293b; z-index: 9999;
    }
    nav button { 
      flex: 1; color: var(--muted); background: none; border: none; 
      display: flex; flex-direction: column; align-items: center; justify-content: center;
    }
    nav button.active { color: var(--accent); font-weight: bold; }
    input, select { 
      width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #334155; 
      background: #0f172a; color: #fff; margin-bottom: 10px;
    }
  </style>
</head>
<body>

<header>
  <h1 style="font-size:18px; color:var(--accent); margin:0;">CALI PRO+</h1>
  <div id="streak-badge">🔥 0</div>
</header>

<div class="container">
  <div id="p-treino" class="page active">
    <div class="card" id="setup">
      <h3>Configurar Treino</h3>
      <select id="lvl-select">
        <option value="Iniciante">Iniciante</option>
        <option value="Médio">Médio</option>
        <option value="Avançado">Avançado</option>
      </select>
      <button class="btn btn-primary" onclick="start()">INICIAR</button>
    </div>
    <div class="card" id="workout" style="display:none;">
      <h2 id="ex-name">---</h2>
      <p id="ex-reps" style="color:var(--accent); font-size:20px;">---</p>
      <button class="btn btn-primary" onclick="next()">PRÓXIMO</button>
      <button class="btn btn-secondary" onclick="stop()">SAIR</button>
    </div>
  </div>

  <div id="p-evo" class="page">
    <div class="card">
      <h3>Sua Evolução</h3>
      <div id="history-list">Nenhum treino ainda.</div>
    </div>
  </div>

  <div id="p-perfil" class="page">
    <div class="card">
      <h3>Meu Perfil</h3>
      <input type="number" id="user-weight" placeholder="Peso (kg)">
      <button class="btn btn-primary" onclick="saveProfile()">SALVAR</button>
    </div>
  </div>
</div>

<nav>
  <button onclick="tab('treino')" id="btn-treino" class="active"><span>💪</span>Treino</button>
  <button onclick="tab('evo')" id="btn-evo"><span>📈</span>Evo</button>
  <button onclick="tab('perfil')" id="btn-perfil"><span>👤</span>Perfil</button>
</nav>

<script>
  // Função para trocar de abas
  function tab(nomeDaPagina) {
    // 1. Esconde todas as páginas
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    // 2. Remove o destaque de todos os botões
    document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
    
    // 3. Mostra a página clicada e destaca o botão
    document.getElementById('p-' + nomeDaPagina).classList.add('active');
    document.getElementById('btn-' + nomeDaPagina).classList.add('active');
  }

  const DATA = {
    'Iniciante': [{n:'Flexão Inclinada', r:'3x12'}, {n:'Agachamento', r:'3x15'}],
    'Médio': [{n:'Flexão Padrão', r:'4x12'}, {n:'Barra Fixa', r:'3x8'}],
    'Avançado': [{n:'Muscle Up', r:'4x5'}, {n:'Pistol Squat', r:'3x8'}]
  };

  let set = [], idx = 0;

  function start() {
    set = DATA[document.getElementById('lvl-select').value];
    idx = 0;
    document.getElementById('setup').style.display = 'none';
    document.getElementById('workout').style.display = 'block';
    render();
  }

  function render() {
    document.getElementById('ex-name').innerText = set[idx].n;
    document.getElementById('ex-reps').innerText = set[idx].r;
  }

  function next() {
    if(idx < set.length - 1) {
      idx++;
      render();
    } else {
      alert("Treino Concluído!");
      stop();
    }
  }

  function stop() {
    document.getElementById('setup').style.display = 'block';
    document.getElementById('workout').style.display = 'none';
  }

  function saveProfile() {
    localStorage.setItem('cali_peso', document.getElementById('user-weight').value);
    alert("Perfil Salvo!");
  }

  // Carregar dados ao abrir
  window.onload = () => {
    document.getElementById('user-weight').value = localStorage.getItem('cali_peso') || "";
  };
</script>

</body>
</html>
