<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <link rel="manifest" href="manifest.json">
  <title>Cali PRO+ Supremo</title>
  <style>
    :root { 
      --bg: #0b1220; --card: #161f35; --accent: #22c55e; 
      --muted: #94a3b8; --text: #fff; --gold: #f59e0b; --blue: #3b82f6;
    }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    
    body { 
      margin: 0; background: var(--bg); color: var(--text);
      font-family: system-ui, -apple-system, sans-serif; min-height: 100vh;
      display: flex; flex-direction: column; overflow-x: hidden;
    }

    header { 
      padding: 15px 20px; background: #0f172a; 
      border-bottom: 1px solid #1e293b; display: flex; 
      justify-content: space-between; align-items: center;
      position: sticky; top: 0; z-index: 100;
    }
    header h1 { margin: 0; font-size: 18px; color: var(--accent); letter-spacing: 1px; }

    .container { flex: 1; padding: 20px 15px 110px; }

    .page { display: none; }
    .page.active { display: block; animation: fadeIn 0.4s ease-out; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

    .card { 
      background: linear-gradient(145deg, #161f35, #121a2b);
      padding: 20px; border-radius: 22px; 
      margin-bottom: 15px; border: 1px solid rgba(34, 197, 94, 0.15);
      box-shadow: 0 8px 16px rgba(0,0,0,0.3);
    }

    .prog-container { height: 10px; background: #0f172a; border-radius: 10px; margin: 15px 0; overflow: hidden; border: 1px solid #1e293b; }
    #prog-bar { height: 100%; width: 0%; background: linear-gradient(90deg, var(--accent), #4ade80); transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1); }

    .btn { 
      border: none; border-radius: 14px; padding: 16px; width: 100%; 
      font-weight: 800; font-size: 16px; cursor: pointer; transition: 0.2s active;
    }
    .btn:active { transform: scale(0.98); opacity: 0.9; }
    .btn-primary { background: var(--accent); color: #064e3b; box-shadow: 0 4px 12px rgba(34, 197, 94, 0.3); }
    .btn-secondary { background: #1e293b; color: var(--text); border: 1px solid #334155; margin-top: 10px; }

    nav { 
      position: fixed; bottom: 0; left: 0; width: 100%; 
      background: #0f172a; display: flex; height: 85px; 
      border-top: 1px solid #1e293b; z-index: 9999;
      padding-bottom: env(safe-area-inset-bottom);
    }
    nav button { 
      flex: 1; color: var(--muted); background: none; border: none; 
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      transition: 0.3s;
    }
    nav button span { font-size: 22px; margin-bottom: 5px; }
    nav button.active { color: var(--accent); }

    input, select { 
      width: 100%; padding: 14px; border-radius: 12px; border: 1px solid #334155; 
      background: #0f172a; color: #fff; margin-bottom: 15px; font-size: 16px;
    }
    label { font-size: 13px; color: var(--muted); margin-bottom: 5px; display: block; }
  </style>
</head>
<body>

<header>
  <h1>CALI PRO+</h1>
  <div id="streak-badge" style="color:var(--gold); font-weight:bold; font-size: 14px;">🔥 0 DIAS</div>
</header>

<div class="container">
  <div id="p-treino" class="page active">
    <div class="card" id="setup">
      <h3 style="margin-top:0">Bora esmagar?</h3>
      <label>Escolha o nível:</label>
      <select id="lvl-select">
        <option value="Iniciante">Iniciante</option>
        <option value="Médio">Médio (Intermediário)</option>
        <option value="Avançado">Avançado (Elite)</option>
      </select>
      <button class="btn btn-primary" onclick="start()">INICIAR TREINO</button>
    </div>

    <div class="card" id="workout" style="display:none;">
      <div class="prog-container"><div id="prog-bar"></div></div>
      <div id="ex-name" style="font-size: 26px; font-weight: 900; letter-spacing: -1px;">---</div>
      <div id="ex-reps" style="font-size: 18px; color: var(--accent); margin: 10px 0 25px; font-weight: bold;">---</div>
      <button class="btn btn-primary" onclick="next()">CONCLUÍDO</button>
      <button class="btn btn-secondary" onclick="stop()">DESISTIR</button>
    </div>

    <div class="card" style="text-align: center;">
      <div id="t-disp" style="font-size: 22px; margin-bottom: 15px; font-weight:bold; font-variant-numeric: tabular-nums;">Descanso: 00s</div>
      <div style="display:grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px;">
        <button class="btn-secondary" style="padding:12px; margin:0" onclick="timer(30)">30s</button>
        <button class="btn-secondary" style="padding:12px; margin:0" onclick="timer(60)">60s</button>
        <button class="btn-secondary" style="padding:12px; margin:0" onclick="timer(90)">90s</button>
      </div>
    </div>
  </div>

  <div id="p-evo" class="page">
    <div class="card">
      <h3 style="margin-top:0">Histórico Recente</h3>
      <div id="history-list"></div>
    </div>
  </div>

  <div id="p-perfil" class="page">
    <div class="card">
      <h3 style="margin-top:0">Meus Dados</h3>
      <label>Peso Corporal (kg)</label>
      <input type="number" id="user-weight" placeholder="Ex: 78">
      <label>Altura (cm)</label>
      <input type="number" id="user-height" placeholder="Ex: 180">
      <button class="btn btn-primary" onclick="saveProfile()">SALVAR PERFIL</button>
    </div>
  </div>
</div>

<nav>
  <button onclick="tab('treino')" id="n-treino" class="active"><span>💪</span>Treino</button>
  <button onclick="tab('evo')" id="n-evo"><span>📈</span>Evolução</button>
  <button onclick="tab('perfil')" id="n-perfil"><span>👤</span>Perfil</button>
</nav>

<script>
const DATA = {
  'Iniciante': [{n:'Flexão Inclinada', r:'3x12'}, {n:'Agachamento', r:'3x15'}, {n:'Prancha', r:'3x30s'}],
  'Médio': [{n:'Flexão Padrão', r:'4x12'}, {n:'Barra Fixa', r:'3x8'}, {n:'Afundo', r:'3x12'}],
  'Avançado': [{n:'Muscle Up', r:'4x5'}, {n:'Flexão Arqueiro', r:'4x10'}, {n:'Pistol Squat', r:'3x8'}]
};

let set = [], idx = 0, interval;

// Função de Som (Beep Sintético)
function beep() {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    osc.frequency.value = 800;
    osc.start();
    gain.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + 0.5);
    osc.stop(ctx.currentTime + 0.5);
  } catch(e) {}
}

function vibrar() {
  if (navigator.vibrate) navigator.vibrate([100, 50, 100]);
}

function tab(t) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
  document.getElementById('p-'+t).classList.add('active');
  document.getElementById('n-'+t).classList.add('active');
}

function start() {
  set = DATA[document.getElementById('lvl-select').value];
  idx = 0;
  document.getElementById('setup').style.display = 'none';
  document.getElementById('workout').style.display = 'block';
  render();
}

function render() {
  const e = set[idx];
  document.getElementById('ex-name').innerText = e.n;
  document.getElementById('ex-reps').innerText = e.r;
  document.getElementById('prog-bar').style.width = ((idx + 1) / set.length) * 100 + '%';
}

function next() {
  vibrar();
  if(idx < set.length - 1) { 
    idx++; render(); 
    timer(45); // Descanso padrão entre exercícios
  } else {
    finish();
  }
}

function finish() {
  const h = JSON.parse(localStorage.getItem('cali_h') || '[]');
  h.push({ d: new Date().toISOString(), l: document.getElementById('lvl-select').value });
  localStorage.setItem('cali_h', JSON.stringify(h));
  vibrar();
  alert("TREINO CONCLUÍDO! MONSTRO! 🏆");
  stop(); refresh();
}

function stop() {
  document.getElementById('setup').style.display = 'block';
  document.getElementById('workout').style.display = 'none';
}

function timer(s) {
  clearInterval(interval);
  let t = s;
  const d = document.getElementById('t-disp');
  interval = setInterval(() => {
    t--; d.innerText = `Descanso: ${t}s`;
    if(t <= 0) { 
      clearInterval(interval); 
      d.innerText = "Descanso: 00s"; 
      beep(); vibrar();
    }
  }, 1000);
}

function saveProfile() {
  localStorage.setItem('cali_peso', document.getElementById('user-weight').value);
  localStorage.setItem('cali_altura', document.getElementById('user-height').value);
  vibrar();
  alert("Perfil salvo com sucesso!");
}

function refresh() {
  const h = JSON.parse(localStorage.getItem('cali_h') || '[]');
  document.getElementById('streak-badge').innerText = `🔥 ${h.length} TREINOS`;
  document.getElementById('history-list').innerHTML = [...h].reverse().slice(0,5).map(i => `
    <div style="padding:12px; border-bottom:1px solid #1e293b; font-size:14px; display:flex; justify-content:space-between">
      <span>${new Date(i.d).toLocaleDateString()}</span>
      <span style="color:var(--accent); font-weight:bold">${i.l}</span>
    </div>
  `).join('') || "<p style='color:var(--muted)'>Nenhum treino registrado.</p>";
}

window.onload = () => {
  refresh();
  document.getElementById('user-weight').value = localStorage.getItem('cali_peso') || "";
  document.getElementById('user-height').value = localStorage.getItem('cali_altura') || "";
};

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(e => {});
}
</script>
</body>
</html>
