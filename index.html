<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#22c55e">
  <title>Cali PRO+ Supremo</title>
  <style>
    :root { 
      --bg: #0b1220; --card: #161f35; --accent: #22c55e; 
      --muted: #94a3b8; --text: #fff; --gold: #f59e0b; --blue: #3b82f6;
    }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body { 
      margin: 0; background: var(--bg); color: var(--text);
      font-family: system-ui, -apple-system, sans-serif; min-height: 100vh;
      display: flex; flex-direction: column; overflow-x: hidden;
    }
    header { 
      padding: 15px 20px; background: #0f172a; 
      border-bottom: 1px solid #1e293b; display: flex; 
      justify-content: space-between; align-items: center;
      position: sticky; top: 0; z-index: 100;
    }
    header h1 { margin: 0; font-size: 18px; color: var(--accent); letter-spacing: 1px; }
    .container { flex: 1; padding: 20px 15px 110px; }
    .page { display: none; }
    .page.active { display: block; animation: fadeIn 0.4s ease-out; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    .card { 
      background: linear-gradient(145deg, #161f35, #121a2b);
      padding: 20px; border-radius: 22px; 
      margin-bottom: 15px; border: 1px solid rgba(34, 197, 94, 0.15);
      box-shadow: 0 8px 16px rgba(0,0,0,0.3);
    }
    .prog-container { height: 10px; background: #0f172a; border-radius: 10px; margin: 15px 0; overflow: hidden; border: 1px solid #1e293b; }
    #prog-bar { height: 100%; width: 0%; background: linear-gradient(90deg, var(--accent), #4ade80); transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1); }
    .btn { border: none; border-radius: 14px; padding: 16px; width: 100%; font-weight: 800; font-size: 16px; cursor: pointer; transition: 0.2s active; }
    .btn-primary { background: var(--accent); color: #064e3b; }
    .btn-secondary { background: #1e293b; color: var(--text); border: 1px solid #334155; margin-top: 10px; }
    nav { position: fixed; bottom: 0; left: 0; width: 100%; background: #0f172a; display: flex; height: 85px; border-top: 1px solid #1e293b; z-index: 9999; }
    nav button { flex: 1; color: var(--muted); background: none; border: none; display: flex; flex-direction: column; align-items: center; justify-content: center; }
    nav button.active { color: var(--accent); }
    input, select { width: 100%; padding: 14px; border-radius: 12px; border: 1px solid #334155; background: #0f172a; color: #fff; margin-bottom: 15px; }
  </style>
</head>
<body>
  <header><h1>CALI PRO+</h1><div id="streak-badge">🔥 0 TREINOS</div></header>
  <div class="container">
    <div id="p-treino" class="page active">
      <div class="card" id="setup">
        <h3>Bora treinar?</h3>
        <select id="lvl-select">
          <option value="Iniciante">Iniciante</option>
          <option value="Médio">Médio</option>
          <option value="Avançado">Avançado</option>
        </select>
        <button class="btn btn-primary" onclick="start()">INICIAR</button>
      </div>
      <div class="card" id="workout" style="display:none;">
        <div class="prog-container"><div id="prog-bar"></div></div>
        <div id="ex-name" style="font-size:24px; font-weight:bold;">---</div>
        <div id="ex-reps" style="color:var(--accent);">---</div>
        <button class="btn btn-primary" onclick="next()">PRÓXIMO</button>
      </div>
    </div>
    <div id="p-evo" class="page"><div class="card"><h3>Histórico</h3><div id="history-list"></div></div></div>
    <div id="p-perfil" class="page"><div class="card"><h3>Perfil</h3><input type="number" id="user-weight" placeholder="Peso (kg)"><button class="btn btn-primary" onclick="saveProfile()">SALVAR</button></div></div>
  </div>
  <nav>
    <button onclick="tab('treino')" class="active"><span>💪</span>Treino</button>
    <button onclick="tab('evo')"><span>📈</span>Evolução</button>
    <button onclick="tab('perfil')"><span>👤</span>Perfil</button>
  </nav>

  <script>
    const DATA = {
      'Iniciante': [{n:'Flexão Inclinada', r:'3x12'}, {n:'Agachamento', r:'3x15'}],
      'Médio': [{n:'Flexão Padrão', r:'4x12'}, {n:'Barra Fixa', r:'3x8'}],
      'Avançado': [{n:'Muscle Up', r:'4x5'}, {n:'Pistol Squat', r:'3x8'}]
    };
    let set = [], idx = 0;
    function tab(t) {
      document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
      document.getElementById('p-'+t).classList.add('active');
    }
    function start() {
      set = DATA[document.getElementById('lvl-select').value]; idx = 0;
      document.getElementById('setup').style.display = 'none';
      document.getElementById('workout').style.display = 'block';
      render();
    }
    function render() {
      document.getElementById('ex-name').innerText = set[idx].n;
      document.getElementById('ex-reps').innerText = set[idx].r;
      document.getElementById('prog-bar').style.width =
